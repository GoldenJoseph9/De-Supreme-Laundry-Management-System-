<div class="login-card">
    <div class="logo-icon">
        <i class="fas fa-soap"></i>
    </div>
    <h2>De Supreme Laundry</h2>
    <div class="sub">Secure access · Role‑based portal</div>

    <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email address</label>
        <input type="email" id="loginEmail" placeholder="your-email@gmail.com" autocomplete="email">
    </div>

    <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="signInBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> Sign In
    </button>

    <div id="loginErrorMsg" class="error-message"></div>

</div>

<script>
    // Firebase configuration (same as your existing files)
    const firebaseConfig = {
        apiKey: "AIzaSyB5duUDZTcu6eXJg8kB3Ciew2im4TMPc7Y",
        authDomain: "trust-corp.firebaseapp.com",
        databaseURL: "https://trust-corp-default-rtdb.firebaseio.com",
        projectId: "trust-corp",
        storageBucket: "trust-corp.firebasestorage.app",
        messagingSenderId: "364233006581",
        appId: "1:364233006581:web:fe030429cd5c7814a8d4bc"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();

    function showError(message) {
        const errDiv = document.getElementById('loginErrorMsg');
        errDiv.textContent = message;
        errDiv.style.display = 'block';
        setTimeout(() => {
            errDiv.style.display = 'none';
        }, 4000);
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('signInBtn');
        if (isLoading) {
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing in...';
            btn.disabled = true;
        } else {
            btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign In';
            btn.disabled = false;
        }
    }

    async function handleLogin(email, password) {
        if (!email || !password) {
            showError('Please enter email and password');
            return false;
        }

        setLoading(true);
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const signedInEmail = userCredential.user.email;

            // Redirect based on email
            if (signedInEmail === 'diorralph16@gmail.com') {
                window.location.href = 'adminTransEntry.html';
            } 
            else if (signedInEmail === 'desupremelaundry@gmail.com') {
                window.location.href = 'finance2.html';
            }
            else {
                await auth.signOut();
                showError(`Unauthorized: "${signedInEmail}" does not have access.`);
                setLoading(false);
                return false;
            }
        } catch (error) {
            let friendlyMsg = 'Login failed: ';
            if (error.code === 'auth/user-not-found') friendlyMsg += 'No account found.';
            else if (error.code === 'auth/wrong-password') friendlyMsg += 'Wrong password.';
            else if (error.code === 'auth/invalid-email') friendlyMsg += 'Invalid email format.';
            else friendlyMsg += error.message;
            showError(friendlyMsg);
            setLoading(false);
        }
    }

    // Event listeners
    document.getElementById('signInBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        handleLogin(email, password);
    });

    // Enter key support
    const passwordInput = document.getElementById('loginPassword');
    const emailInput = document.getElementById('loginEmail');
    function onEnter(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('signInBtn').click();
        }
    }
    passwordInput.addEventListener('keypress', onEnter);
    emailInput.addEventListener('keypress', onEnter);
</script>
